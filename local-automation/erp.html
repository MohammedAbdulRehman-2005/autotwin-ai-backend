<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTwin ERP Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 50px; 
            background-color: #f8f9fa; 
            color: #333;
        }
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { 
            text-align: center; 
            color: #2c3e50; 
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #555;
        }
        input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ced4da; 
            border-radius: 5px; 
            box-sizing: border-box; 
            font-size: 16px;
            transition: all 0.3s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #80bdff;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25);
        }
        button[type="submit"] { 
            width: 100%; 
            padding: 14px; 
            background-color: #0d6efd; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button[type="submit"]:hover { 
            background-color: #0b5ed7; 
        }
        #success-msg { 
            display: none; 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #d1e7dd; 
            color: #0f5132; 
            border: 1px solid #badbcc;
            border-radius: 5px; 
            text-align: center; 
            font-weight: bold;
        }
        .logo-placeholder {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-placeholder">🌐 Acme ERP System</div>
        <h2>Invoice Data Entry</h2>
        <form id="erp-form">
            <div class="form-group">
                <label for="vendor">Vendor Name</label>
                <input type="text" id="vendor" name="vendor" placeholder="e.g. ABC Ltd" required>
            </div>
            <div class="form-group">
                <label for="invoice_id">Invoice ID</label>
                <input type="text" id="invoice_id" name="invoice_id" placeholder="e.g. INV123" required>
            </div>
            <div class="form-group">
                <label for="po">PO Number</label>
                <input type="text" id="po" name="po" placeholder="e.g. PO123" required>
            </div>
            <div class="form-group">
                <label for="gst">GST (%)</label>
                <input type="number" id="gst" name="gst" placeholder="e.g. 18" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" name="amount" placeholder="e.g. 5000" step="0.01" required>
            </div>
            <button type="submit">Submit to System</button>
        </form>
        <div id="success-msg">✅ Data successfully saved to ERP Database!</div>
    </div>
    
    <script>
        document.getElementById('erp-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Add a small delay simulator for realism
            const btn = document.querySelector('button[type="submit"]');
            btn.innerHTML = 'Processing...';
            btn.style.backgroundColor = '#6c757d';
            
            setTimeout(() => {
                this.style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
                document.querySelector('h2').style.display = 'none';
            }, 800);
        });
    </script>
</body>
</html>
